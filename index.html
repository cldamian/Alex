<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alexandra Peluha 💕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:     #e8425a;
      --blush:    #f4a7b9;
      --cream:    #fff8f0;
      --deep:     #1a0a0f;
      --gold:     #c9933a;
      --text:     #3d1a26;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      background: var(--deep);
      color: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* === BACKGROUND PETALS === */
    .bg-canvas {
      position: fixed; inset: 0; overflow: hidden; z-index: 0;
      background: radial-gradient(ellipse at 20% 50%, #3d0a1a 0%, #1a0a0f 55%, #0d0508 100%);
    }
    .bg-canvas::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 75% 20%, rgba(232,66,90,0.18) 0%, transparent 50%),
        radial-gradient(circle at 10% 80%, rgba(244,167,185,0.12) 0%, transparent 45%);
    }

    /* Floating particles */
    .particle {
      position: absolute;
      border-radius: 50% 0 50% 0;
      opacity: 0;
      animation: floatUp var(--dur) ease-in var(--delay) infinite;
      background: var(--rose);
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg);  opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* === CARD === */
    .card {
      position: relative; z-index: 10;
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 900px; width: 94vw;
      min-height: 520px;
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,147,58,0.25);
      animation: cardIn 1.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(40px) scale(0.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* Left panel — image */
    .card__image {
      position: relative;
      background: #2a0d14;
      overflow: hidden;
    }
    .card__image img {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.85;
      transition: transform 8s ease, opacity 0.6s;
      transform-origin: center;
      animation: kenBurns 12s ease-in-out infinite alternate;
    }
    @keyframes kenBurns {
      from { transform: scale(1.05) translateX(0); }
      to   { transform: scale(1.12) translateX(-3%); }
    }
    .card__image::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to right, transparent 60%, var(--deep) 100%),
                  linear-gradient(to top, rgba(26,10,15,0.6) 0%, transparent 50%);
    }
    .card__image-label {
      position: absolute; bottom: 1.5rem; left: 1.5rem; z-index: 2;
      font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--blush); opacity: 0.8;
    }

    /* Right panel — content */
    .card__content {
      display: flex; flex-direction: column; justify-content: center;
      padding: 3.5rem 3rem 3rem;
      background: linear-gradient(135deg, #1f0a12 0%, #160710 100%);
      position: relative;
    }
    .card__content::before {
      content: '♡';
      position: absolute; top: 1.8rem; right: 2rem;
      font-size: 5rem; color: rgba(232,66,90,0.07);
      font-family: serif; line-height: 1;
    }

    /* Gold divider */
    .divider {
      width: 3rem; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 1.2rem 0;
    }

    .eyebrow {
      font-size: 0.65rem; letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--gold); opacity: 0.9;
      animation: fadeSlide 1s 0.4s both;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 4vw, 3.4rem);
      line-height: 1.1;
      color: var(--cream);
      animation: fadeSlide 1s 0.55s both;
    }
    h1 em {
      font-style: italic;
      color: var(--blush);
    }

    .subtitle {
      font-size: 1.05rem; font-weight: 300; font-style: italic;
      color: rgba(255,248,240,0.6); line-height: 1.65;
      margin-top: 0.2rem;
      animation: fadeSlide 1s 0.7s both;
    }

    .cta-wrap {
      margin-top: 2.5rem;
      animation: fadeSlide 1s 0.9s both;
    }
    .btn-enter {
      display: inline-flex; align-items: center; gap: 0.75rem;
      text-decoration: none;
      background: transparent;
      color: var(--cream);
      border: 1px solid rgba(201,147,58,0.5);
      padding: 0.9rem 2.2rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem; letter-spacing: 0.2em; text-transform: uppercase;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: color 0.4s, border-color 0.4s;
    }
    .btn-enter::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--rose), #c9365c);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
      z-index: -1;
    }
    .btn-enter:hover::before { transform: scaleX(1); }
    .btn-enter:hover { border-color: transparent; }
    .btn-enter .arrow {
      display: inline-block;
      transition: transform 0.3s;
    }
    .btn-enter:hover .arrow { transform: translateX(4px); }

    @keyframes fadeSlide {
      from { opacity:0; transform: translateY(18px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 640px) {
      html, body { overflow: auto; }
      .card { grid-template-columns: 1fr; min-height: unset; }
      .card__image { height: 240px; }
      .card__image::after {
        background: linear-gradient(to bottom, transparent 50%, var(--deep) 100%);
      }
      .card__content { padding: 2.5rem 2rem; }
    }
  </style>
</head>
<body>

  <!-- Animated background -->
  <div class="bg-canvas" id="bgCanvas"></div>

  <!-- Main card -->
  <article class="card">
    <!-- Left: image -->
    <div class="card__image">
      <img src="/Imagenes/0.webp" alt="Alexandra">
      <span class="card__image-label">Para siempre ♡</span>
    </div>

    <!-- Right: content -->
    <div class="card__content">
      <p class="eyebrow">Con todo mi amor</p>
      <div class="divider"></div>
      <h1>Bienvenida<br>a <em>tu página</em> ♡</h1>
      <p class="subtitle">Un lugar hecho con amor,<br>solo para ti, Alexandra.</p>
      <div class="cta-wrap">
        <a href="index2.html" class="btn-enter">
          Entrar <span class="arrow">→</span>
        </a>
      </div>
    </div>
  </article>

  <script>
    // Generate floating heart petals
    const canvas = document.getElementById('bgCanvas');
    const colors = ['#e8425a','#f4a7b9','#c9933a','#ff9ab0'];
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 10 + 4;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        --dur:${Math.random()*12+10}s;
        --delay:${Math.random()*14}s;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        opacity:0;
      `;
      canvas.appendChild(p);
    }
  </script>
</body>
</html>



  <script src="https://cdn.jsdelivr.net/npm/tw-elements/dist/js/tw-elements.umd.min.js"></script>
</body>
</html>
